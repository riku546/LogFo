# groupsを使って、モノレポ全体の依存関係を一つのPRにまとめる
# lockfile-directoriesを使って、ロックファイルがルートにあることを明示
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    
    groups:
      monorepo-deps:
        patterns:
          - "*" 

    lockfile-directories:
      - "/" 