name: backend

on:
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    defaults:
        run:
            working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with: 
          version: 10.14.0

      - name: Enable corepack (pnpmの利用準備)
        run: corepack enable

      - name: Install backend dependencies
        run: pnpm install

      - name: Biome check
        run: pnpm exec biome check

      - name: TypeScript type check 
        run: pnpm exec tsc --noEmit