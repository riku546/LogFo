name: backend-check

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    defaults:
        run:
            working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with: 
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Enable corepack (pnpmの利用準備)
        run: corepack enable

      - name: Install backend dependencies
        run: pnpm install

      - name: Architecture dependency check
        run: pnpm depcruise

      - name: Biome check
        run: pnpm exec biome check

      - name: copy env file
        run: cp .env.example .env
      
      - name: wrangler type generation
        run: pnpm exec wrangler types 
      
      - name: TypeScript type check 
        run: pnpm exec tsc --noEmit

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run integration tests
        run: pnpm test:integration

      - name: Run backend coverage
        run: pnpm test:coverage

      - name: Summarize backend coverage
        run: |
          node -e 'const fs=require("node:fs"); const path="coverage/coverage-summary.json"; const summary=JSON.parse(fs.readFileSync(path,"utf8")).total; const lines=["## Backend Coverage","", "| Metric | Percent | Covered / Total |", "| --- | ---: | ---: |"]; for (const metric of ["lines","statements","functions","branches"]) { const item=summary[metric]; lines.push(`| ${metric} | ${item.pct}% | ${item.covered} / ${item.total} |`); } fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join("\n")}\n`);'

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage
          if-no-files-found: error
